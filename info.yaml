# Tiny Tapeout project information
project:
  title:        "triad01"      # Project title
  author:       "Duan Yihe"      # Your name
  discord:      "_alanthegreat"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "TRIAD01 implements a hardware BitLinear layer — the core primitive of Microsoft's BitNet b1.58 architecture — applied to autonomous drone failsafe arbitration. Four health features are evaluated through a ternary weight matrix {-1, 0, +1} with no multipliers, producing three class scores. An argmax selects the failsafe action. Weights are fixed at synthesis time from an offline-trained policy. The design includes scan chain and LBIST, following industry DFT practice."      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     50000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 340x160 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 3x4 or 4x4

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_Alanduan21_triad01_top"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"
    - "triad01_input_filter.v"
    - "triad01_ternary_engine.v"
    - "triad01_decision_fsm.v"
    
  

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "fc_live"
  ui[1]: "rc_live"
  ui[2]: "fc_conf"
  ui[3]: "rc_conf"
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "decision[0]"
  uo[1]: "decision[1]"
  uo[2]: "decision_valid"
  uo[3]: "fc_score[0]"
  uo[4]: "fc_score[1]"
  uo[5]: "rc_score[0]"
  uo[6]: "rc_score[1]"
  uo[7]: "1'b0"

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
